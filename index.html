                      placeholder="Teaching points, when to use this play, common mistakes to watch for..."
                      rows={3}
                    />
                  </div>
                  <div className="modal-actions">
                    <button
                      className="btn btn-outline"
                      onClick={() => setShowSaveModal(false)}
                    >
                      Cancel
                    </button>
                    <button className="btn btn-green" onClick={doSave}>
                      Save Play
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* Edit meta modal */}
            {showEditMeta && (
              <div
                className="modal-overlay"
                onClick={() => setShowEditMeta(false)}
              >
                <div className="modal" onClick={(e) => e.stopPropagation()}>
                  <h3>Edit Play Details</h3>
                  <div className="field-group">
                    <label>Play Name</label>
                    <input
                      autoFocus
                      value={editName}
                      onChange={(e) => setEditName(e.target.value)}
                    />
                  </div>
                  <div className="field-group">
                    <label>Age Group</label>
                    <select
                      value={editAge}
                      onChange={(e) => setEditAge(e.target.value)}
                    >
                      {AGE_GROUPS.map((a) => (
                        <option key={a.value} value={a.value}>
                          {a.label}
                        </option>
                      ))}
                    </select>
                  </div>
                  <div className="field-group">
                    <label>Description</label>
                    <input
                      value={editDesc}
                      onChange={(e) => setEditDesc(e.target.value)}
                    />
                  </div>
                  <div className="field-group">
                    <label>Overall Coach Notes</label>
                    <textarea
                      value={editNotes}
                      onChange={(e) => setEditNotes(e.target.value)}
                      rows={4}
                    />
                  </div>
                  <div className="modal-actions">
                    <button
                      className="btn btn-outline"
                      onClick={() => setShowEditMeta(false)}
                    >
                      Cancel
                    </button>
                    <button className="btn btn-green" onClick={doEditMeta}>
                      Save Changes
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* Delete confirm */}
            {showDeleteConfirm && (
              <div
                className="modal-overlay"
                onClick={() => setShowDeleteConfirm(null)}
              >
                <div
                  className="modal"
                  onClick={(e) => e.stopPropagation()}
                  style={{ width: 340 }}
                >
                  <h3>Delete Play</h3>
                  <p className="confirm-text">
                    Remove "{plays[showDeleteConfirm]?.name}"?
                  </p>
                  <p className="confirm-sub">This can't be undone.</p>
                  <div className="modal-actions">
                    <button
                      className="btn btn-outline"
                      onClick={() => setShowDeleteConfirm(null)}
                    >
                      Cancel
                    </button>
                    <button
                      className="btn btn-red"
                      onClick={() => deletePlay(showDeleteConfirm)}
                    >
                      Delete
                    </button>
                  </div>
                </div>
              </div>
            )}
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("app")).render(<App />);
    </script>
  </body>
</html>
